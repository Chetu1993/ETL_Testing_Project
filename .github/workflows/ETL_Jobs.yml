name: ETL Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: setup PYTHONPATH
        run:  echo "PYTHONPATH=$PWD" >> GITHUB_ENV

      - name: Run tests
        run: pytest

        


