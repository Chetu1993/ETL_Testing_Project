name: ETL Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs_on: windows-latest

  steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m tests/test_db_validations.py
        

